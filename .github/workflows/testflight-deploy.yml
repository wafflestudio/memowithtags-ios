name: Deploy Testflight & App Store

on:
  push:
    tags:
      - testflight/v[0-9]+.[0-9]+.[0-9]+-*.[0-9]+
      - appstore/v[0-9]+.[0-9]+.[0-9]+-*.[0-9]+

jobs:
  deploy:
    name: Fastlane Deploy
    runs-on: macos-15
    defaults:
      run:
        working-directory: MemoWithTags

    env:
      SCHEME_NAME: ${{ secrets.SCHEME_NAME }}
      XCODEPROJ_NAME: ${{ secrets.XCODEPROJ_NAME }}
      BUNDLE_IDENTIFIER: ${{ secrets.BUNDLE_IDENTIFIER }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
      TEAM_ID: ${{ secrets.TEAM_ID }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_DEPLOY_KEY: ${{ secrets.MATCH_DEPLOY_KEY }}
      GIT_PAT: ${{ secrets.GIT_PAT }}
      GIT_TAG_NAME: ${{ github.ref_name }}
      XCODE_VERSION: "16.0"

    steps:
      - name: Parse tag name
        uses: actions-ecosystem/action-regex-match@v2
        id: regex
        with:
          text: ${{ github.ref_name }}
          regex: '^(testflight|appstore)\/v(\d+)\.(\d+)\.(\d+)-(release|debug)\.(\d+)$'

      - uses: actions/checkout@v3
      
      - run: |
          sudo xcode-select -s /Applications/Xcode_${XCODE_VERSION}.app/Contents/Developer
          ls

      - name: Set version number and build number
        run: |
          # 디버깅을 위한 출력
          echo "🔍 Parsing tag: ${{ github.ref_name }}"
          echo "Regex groups:"
          echo "  group1 (platform): ${{ steps.regex.outputs.group1 }}"
          echo "  group2 (major): ${{ steps.regex.outputs.group2 }}"
          echo "  group3 (minor): ${{ steps.regex.outputs.group3 }}"
          echo "  group4 (patch): ${{ steps.regex.outputs.group4 }}"
          echo "  group5 (type): ${{ steps.regex.outputs.group5 }}"
          echo "  group6 (build): ${{ steps.regex.outputs.group6 }}"
          
          # 각 그룹이 비어있지 않은지 확인
          if [ -z "${{ steps.regex.outputs.group2 }}" ] || [ -z "${{ steps.regex.outputs.group3 }}" ] || [ -z "${{ steps.regex.outputs.group4 }}" ]; then
            echo "❌ Error: Version components are empty"
            echo "Major: '${{ steps.regex.outputs.group2 }}'"
            echo "Minor: '${{ steps.regex.outputs.group3 }}'"
            echo "Patch: '${{ steps.regex.outputs.group4 }}'"
            exit 1
          fi
          
          if [ -z "${{ steps.regex.outputs.group6 }}" ]; then
            echo "❌ Error: Build number is empty"
            echo "Build: '${{ steps.regex.outputs.group6 }}'"
            exit 1
          fi
          
          # 환경 변수 설정
          VERSION_NUMBER="${{ steps.regex.outputs.group2 }}.${{ steps.regex.outputs.group3 }}.${{ steps.regex.outputs.group4 }}"
          BUILD_NUMBER="${{ steps.regex.outputs.group6 }}"
          
          echo "✅ Setting VERSION_NUMBER=$VERSION_NUMBER"
          echo "✅ Setting BUILD_NUMBER=$BUILD_NUMBER"
          
          echo "VERSION_NUMBER=$VERSION_NUMBER" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

      - name: Validate version format
        run: |
          echo "🔧 Validating version format..."
          echo "VERSION_NUMBER: '$VERSION_NUMBER'"
          echo "BUILD_NUMBER: '$BUILD_NUMBER'"
          
          # 버전 형식 검증 (X.X.X)
          if ! [[ $VERSION_NUMBER =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: $VERSION_NUMBER"
            echo "Expected format: X.X.X (e.g., 1.0.0)"
            exit 1
          fi
          
          # 빌드 번호 검증 (숫자만)
          if ! [[ $BUILD_NUMBER =~ ^[0-9]+$ ]]; then
            echo "❌ Invalid build number format: $BUILD_NUMBER"
            echo "Expected format: number (e.g., 0, 1, 123)"
            exit 1
          fi
          
          echo "✅ Version format validation passed"

      - name: Install Ruby Dependencies
        run: | 
          bundle install
          bundle update fastlane

      - name: Setup git ssh - repo mapping
        uses: shaunco/ssh-agent@git-repo-mapping
        with:
          ssh-private-key: ${{ secrets.MATCH_DEPLOY_KEY }}
          repo-mappings: github.com/wafflestudio/wafflestudio-apple-certificates

      - name: Configure ssh agent
        env:
          GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no"
        run: |
          eval "$(ssh-agent -s)"
          ssh-add - <<< "$MATCH_DEPLOY_KEY"

      - name: Upload dev app to TestFlight
        if: ${{ steps.regex.outputs.group1 == 'testflight' && steps.regex.outputs.group5 == 'debug' }}
        run: |
          bundle exec fastlane beta --env dev

      - name: Upload prod app to App Store
        if: ${{ steps.regex.outputs.group1 == 'appstore' && steps.regex.outputs.group5 == 'release' }}
        run: |
          bundle exec fastlane release --env prod
